name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: latest
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
      - run: pnpm i
      - run: pnpm build
